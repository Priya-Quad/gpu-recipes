# 1. Kueue & Scheduling
queue: tas-lq

dwsSettings:
  maxRunDurationSeconds: 604800

# 2. Authentication
huggingface:
  secretName: hf-secret
  secretData:
    token: "hf_api_token"

# 3. Storage
volumes:
  gcsVolumes: true
  ssdMountPath: "/ssd"
  gcsMounts:
    - bucketName: depksingh-test-chpt
      mountPath: "/gcs"

# 4. Networking & Service
service:
  type: ClusterIP
  ports:
    http: 8000

# 5. Wan2.2 Workload Configuration
workload:
  model:
    name: Wan-AI/Wan2.2-T2V-A14B-Diffusers
  gpus: 1  # Adjusted from 8 to 1 for Wan2.2
  image: us-docker.pkg.dev/gke-ai-infra/gpu-recipes/sglang:latest
  framework: sglang
  configFile: serving-args.yaml
  configPath: /workload/configs
  envs:
    - name: HF_HUB_ENABLE_HF_TRANSFER
      value: "1"
    - name: LAUNCHER_SCRIPT
      value: "/workload/launcher/launch-workload.sh"
    - name: SERVER_ARGS_FILE
      value: "/workload/configs/serving-args.yaml"
    - name: HF_HOME
      value: "/ssd"
    - name: LD_LIBRARY_PATH
      value: "/usr/local/nvidia/lib64:/usr/local/lib/"

# 6. Blackwell Specific Networking
network:
  subnetworks: []
  gibVersion: us-docker.pkg.dev/gce-ai-infra/gpudirect-gib/nccl-plugin-gib:v1.0.5
  ncclSettings:
    - name: NCCL_DEBUG
      value: "WARN"
