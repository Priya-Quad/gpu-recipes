# Optimized for Wan2.2 Diffusion on Blackwell (A4)

queue: ${KUEUE_NAME}

dwsSettings:
  maxRunDurationSeconds: 7200 # Increased for long video benchmarks

huggingface:
  secretName: hf-secret
  secretData:
    token: "hf_api_token"

volumes:
  gcsVolumes: true
  ssdMountPath: "/ssd"
  gcsMounts:
    - bucketName: ${GCS_BUCKET}
      mountPath: "/gcs"

service:
  type: ClusterIP
  ports:
    http: 8000

workload:
  model:
    name: "Wan-AI/Wan2.2-I2V-A14B-Diffusers"
  # Shard across 4 Blackwell GPUs (TP=4)
  gpus: 4 
  image: ${ARTIFACT_REGISTRY}/${SGLANG_IMAGE}:${SGLANG_VERSION}
  framework: sglang
  # Reference the Wan-specific config we created
  configFile: wan2_2.yaml 
  configPath: /workload/configs
  envs:
    - name: HF_HUB_ENABLE_HF_TRANSFER
      value: "1"
    - name: NCCL_NVLS_ENABLE
      value: "1"  # CRITICAL: Enable Blackwell NVLink Switch
    - name: SGLANG_USE_FLASHINFER
      value: "1"  # Optimized kernels for Blackwell
    - name: LAUNCHER_SCRIPT
      value: "/workload/launcher/launch-workload.sh"
    - name: SERVER_ARGS_FILE
      value: "/workload/configs/wan2_2.yaml"
    - name: HF_HOME
      value: "/ssd"
    - name: LD_LIBRARY_PATH
      value: "/usr/local/nvidia/lib64:/usr/local/lib/"

network:
  # Standard GKE A4 Network Settings
  gibVersion: us-docker.pkg.dev/gce-ai-infra/gpudirect-gib/nccl-plugin-gib:v1.0.5
  ncclSettings:
    - name: NCCL_DEBUG
      value: "WARN"
      value: "WARN"
