# Optimized for Wan2.2 Diffusion on Blackwell (A4)
queue: "${KUEUE_NAME}"

huggingface:
  secretName: hf-secret
  secretData:
    token: "hf_api_token"

volumes:
  gcsVolumes: true
  ssdMountPath: "/ssd"
  # --- ADDED FOR BLACKWELL: Shared Memory is mandatory ---
  shm:
    enabled: true
    size: "32Gi"
    name: "dshm"
  # --- FIXED: Every mount must have a name ---
  gcsMounts:
    - name: "gcs-fuse"
      bucketName: "${GCS_BUCKET}"
      mountPath: "/gcs"

service:
  type: ClusterIP
  ports:
    http: 8000

workload:
  model:
    name: "Wan-AI/Wan2.2-T2V-A14B-Diffusers"
  # Wan2.2 A14B runs perfectly on 4 Blackwell GPUs (TP=4)
  gpus: 4 
  image: "${ARTIFACT_REGISTRY}/${SGLANG_IMAGE}:${SGLANG_VERSION}"
  framework: sglang
  configFile: "wan2.2.yaml" 
  configPath: "/workload/configs"
  envs:
    - name: HF_HUB_ENABLE_HF_TRANSFER
      value: "1"
    - name: NCCL_NVLS_ENABLE
      value: "1"  # CRITICAL for Blackwell NVLink Switch
    - name: SGLANG_USE_FLASHINFER
      value: "1"  # Optimized kernels for Blackwell
    - name: LAUNCHER_SCRIPT
      value: "/workload/launcher/launch-workload.sh"
    - name: SERVER_ARGS_FILE
      value: "/workload/configs/wan2.2.yaml"
    - name: HF_HOME
      value: "/ssd"

network:
  hostNetwork: true
  gibVersion: us-docker.pkg.dev/gce-ai-infra/gpudirect-gib/nccl-plugin-gib:v1.0.5
  ncclSettings:
    - name: NCCL_DEBUG
      value: "WARN"
