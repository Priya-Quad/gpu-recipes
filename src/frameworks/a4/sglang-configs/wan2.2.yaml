# Wan2.2 Text-to-Video Optimized Configuration
model-path: "Wan-AI/Wan2.2-T2V-A14B-Diffusers"
host: 0.0.0.0
port: 8000

# Parallelism settings for 4x B200 GPUs
tp: 4
trust-remote-code: true

# Blackwell Performance Optimizations
attention-backend: "flashinfer"
enable-torch-compile: true

# Diffusion specific settings (often passed as server args or environment vars)
# These ensure the server loads the Video-VAE and DiT correctly
SGLANG_CACHE_DIT_ENABLED: "true"
